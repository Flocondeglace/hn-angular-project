<h1>Exercice 1</h1>
<p
  [style]="
    'font-family:' +
    form.value.font +
    ' ;' +
    'text-align:' +
    form.value.alignment +
    ';' +
    'font-size:' +
    form.value.size +
    'px;'
  "
  class="border border-dark rounded p-3"
>
  Bonjour {{ form.value.enteredName | uppercase }} !
</p>

<form [formGroup]="form">
  <input type="text" formControlName="enteredName" class="form-control my-2" />
  <select formControlName="font" class="form-select my-2">
    <option value="Times New Roman" selected>Times New Roman</option>
    <option value="Arial">Arial</option>
  </select>
  <input type="number" formControlName="size" class="form-control my-2" />
  <div class="row mx-3">
    <div class="form-check col">
      <input
        type="radio"
        name="alignment"
        value="left"
        formControlName="alignment"
        class="form-check-input"
        id="leftRadioBtn"
      />
      <label class="form-check-label" for="leftRadioBtn">Left </label>
    </div>
    <div class="form-check col">
      <input
        type="radio"
        name="alignment"
        value="center"
        formControlName="alignment"
        class="form-check-input"
        id="centerRadioBtn"
      />
      <label class="form-check-label" for="centerRadioBtn">Center</label>
    </div>
    <div class="form-check col">
      <input
        type="radio"
        name="alignment"
        value="right"
        formControlName="alignment"
        class="form-check-input"
        id="rightRadioBtn"
      />
      <label class="form-check-label" for="rightRadioBtn">Right</label>
    </div>
  </div>
</form>
